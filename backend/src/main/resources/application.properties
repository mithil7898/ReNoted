spring.application.name=ReNoted

# ============================================================================
# DATABASE CONFIGURATION
# ============================================================================
# Why we configure this:
# - Spring Boot needs to know WHERE the database is (URL)
# - What USERNAME and PASSWORD to use
# - What DATABASE DRIVER to use (PostgreSQL)

# Database URL
# Format: jdbc:postgresql://HOST:PORT/DATABASE_NAME
# localhost = this computer
# 5432 = PostgreSQL default port
# renoted = database name we'll create
spring.datasource.url=jdbc:postgresql://localhost:5432/renoted

# Database credentials
# Default PostgreSQL username is 'postgres'
spring.datasource.username=postgres

# IMPORTANT: Replace 'YOUR_PASSWORD_HERE' with your actual PostgreSQL password
spring.datasource.password=0000

# Database driver class
# Tells Spring which driver to use for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================================
# JPA = Java Persistence API (standard for database operations)
# Hibernate = Implementation of JPA that does the actual work

# Show SQL queries in console
# This is VERY helpful for learning - you'll see what SQL Hibernate generates
spring.jpa.show-sql=true

# Format SQL queries nicely in console
# Makes them easier to read and understand
spring.jpa.properties.hibernate.format_sql=true

# DDL Auto Mode - IMPORTANT SETTING
#   - update: Update schema automatically if entities change (BEST for development)
# We use 'update' for development - safe and automatically updates database structure
spring.jpa.hibernate.ddl-auto=update

# Hibernate SQL Dialect
# Tells Hibernate which flavor of SQL to generate
# PostgreSQL has specific syntax, so we specify PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
# The port your application will run on
# Default is 8080 - you can access your app at http://localhost:8080
server.port=8080

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# These help you see what's happening (great for learning!)
# Log levels: TRACE (most detailed), DEBUG, INFO, WARN, ERROR (least detailed)

# Log level for our application code
logging.level.com.renoted=DEBUG

# Show actual SQL queries
logging.level.org.hibernate.SQL=DEBUG

# Show parameter values in SQL queries (the ? placeholders)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

